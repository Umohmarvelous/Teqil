events {
    worker_connections 1024;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Upstreams for microservices
    upstream auth_service {
        server auth-service:3001;
    }
    
    upstream trip_service {
        server trip-service:3002;
    }

    upstream payment_service {
        server payment-service:3003;
    }

    upstream engagement_service {
        server engagement-service:3004;
    }

    upstream ad_analytics_service {
        server ad-analytics-service:3005;
    }

    upstream notification_service {
        server notification-service:3006;
    }

    upstream credits_service {
        server credits-service:3007;
    }

    server {
        listen 80;
        server_name localhost;

        # Cross-Origin Resource Sharing (CORS)
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type';

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Routing to Microservices
        location /api/auth/ {
            proxy_pass http://auth_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/trips/ {
            proxy_pass http://trip_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/payments/ {
            proxy_pass http://payment_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/engagement/ {
            proxy_pass http://engagement_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ads/ {
            proxy_pass http://ad_analytics_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/notifications/ {
            proxy_pass http://notification_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/credits/ {
            proxy_pass http://credits_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Fallback / Health
        location /api/health {
            default_type application/json;
            return 200 '{"status": "API Gateway is running"}';
        }
    }
}
